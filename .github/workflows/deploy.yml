name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      STATIC_EXPORT: "true"
      NEXT_PUBLIC_STATIC_EXPORT: "true"
      NEXT_PUBLIC_BASE_PATH: /Happy-birthday-to-me
      NEXT_PUBLIC_ANNIVERSARY_ALLOWED_NAME: ${{ secrets.ANNIVERSARY_ALLOWED_NAME }}
      NEXT_PUBLIC_ANNIVERSARY_ALLOWED_CODE: ${{ secrets.ANNIVERSARY_ALLOWED_CODE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/prepare-static-export.mjs

      - run: npm run build

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
